services:
  postgres:
    image: postgres:16-alpine
    container_name: school_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: school
      POSTGRES_PASSWORD: school
      POSTGRES_DB: school_management
    ports:
      - "5432:5432"
    volumes:
      - school_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U school -d school_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  school_pgdata:
