name: CI

# Quality gate: on every push to main and every PR, typecheck + build both apps
# and build the Docker image. A red ✗ here means broken code never reaches a
# live school. Runs entirely on GitHub's runners — no server needed.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate   # generate Prisma client types (no DB needed)
      - run: npm run typecheck
      - run: npm run build

  tests:
    name: Backend — integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: school
          POSTGRES_PASSWORD: school
          POSTGRES_DB: school_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U school"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Matches tests/tenants.test.json. migrate deploy here ALSO verifies a brand
      # new school DB provisions cleanly (the one-DB-per-tenant deploy step).
      DATABASE_URL: postgresql://school:school@localhost:5432/school_test?schema=public
      JWT_SECRET: ci-test-secret-1234567890
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npx prisma migrate deploy   # fresh-DB migration check
      - run: npx tsx prisma/seed.ts      # seed the admin the tests authenticate as
      - run: npm test

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Builds the actual deploy artifact (frontend + backend + prisma generate),
      # catching Dockerfile/runtime issues the per-app builds above can't. No push.
      - run: docker build -t school-mgmt:ci .
